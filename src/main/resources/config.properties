# =====================================================================
# Default configuration (overridden per-environment by config-<env>.properties
# and by -D system properties passed at runtime, e.g. -Dbrowser=firefox)
# =====================================================================

browser=chrome
headless=false
implicit.wait.seconds=10
explicit.wait.seconds=20
page.load.timeout.seconds=30
base.url=https://example.com
screenshot.on.failure=true
screenshot.dir=target/screenshots
report.dir=target/reports
retry.max.count=2
remote.execution=false
remote.grid.url=http://localhost:4444/wd/hub
